[terminal.shell]
program = "/usr/bin/zsh"
args = ["-l"]

[window]
opacity = 0.85
padding = { x = 8, y = 6 }
decorations = "none"
dynamic_title = true

[font]
size = 10.5
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }

# Zenburn-warm palette
[colors.primary]
background = "#1f1f1f"
foreground = "#dcdccc"
dim_foreground = "#9f9f9f"

[colors.cursor]
text = "#1f1f1f"
cursor = "#f0dfaf"

[colors.selection]
text = "#1f1f1f"
background = "#f0dfaf"

[colors.normal]
black   = "#3f3f3f"
red     = "#cc4444"
green   = "#9fbc9f"
yellow  = "#f0dfaf"
blue    = "#8cd0d3"
magenta = "#dc8cc3"
cyan    = "#93e0e3"
white   = "#dcdccc"

[colors.bright]
black   = "#5f5f5f"
red     = "#dc8c8c"
green   = "#c1cf99"
yellow  = "#f0efaf"
blue    = "#9fd7e3"
magenta = "#ec9dd0"
cyan    = "#a3f0f3"
white   = "#ffffff"

[cursor]
style = { shape = "Beam", blinking = "On" }
unfocused_hollow = true

# Preserve user's Shift+Enter literal-newline binding
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
